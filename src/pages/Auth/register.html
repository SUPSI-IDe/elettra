<section class="register-page">
  <div class="register-container">
    <div class="register-header">
      <button class="back-btn" data-action="back-to-landing" aria-label="Back to landing page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 data-i18n="register.title">Create Account</h1>
      <p class="register-subtitle" data-i18n="register.subtitle">Join Elettra to manage your electric fleet</p>
    </div>

    <form class="register-form" data-form="register">
      <div class="form-feedback" data-role="register-feedback" role="alert" aria-live="polite" hidden></div>

      <div class="form-row">
        <div class="form-group">
          <label for="register-first-name" data-i18n="register.first_name">First Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="register-first-name"
              name="first_name"
              required
              autocomplete="given-name"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="register-last-name" data-i18n="register.last_name">Last Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="register-last-name"
              name="last_name"
              required
              autocomplete="family-name"
            />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="register-email" data-i18n="register.email">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            id="register-email"
            name="email"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="register-agency" data-i18n="register.agency">Company / Agency</label>
        <div class="input-wrapper autocomplete-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 21h18"/>
            <path d="M9 21V8l-6 3v10"/>
            <path d="M9 3h6v18H9z"/>
            <path d="M15 21V8l6 3v10"/>
          </svg>
          <input
            type="text"
            id="register-agency"
            name="agency_name"
            required
            autocomplete="off"
            data-agency-id=""
          />
          <input type="hidden" name="agency_id" id="register-agency-id" />
          <div class="autocomplete-dropdown" data-role="agency-dropdown" hidden>
            <ul class="autocomplete-list" data-role="agency-list"></ul>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="register-password" data-i18n="register.password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="register-password"
            name="password"
            required
            autocomplete="new-password"
            minlength="8"
          />
          <button type="button" class="toggle-password" data-target="register-password" aria-label="Toggle password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <p class="input-hint" data-i18n="register.password_hint">Must be at least 8 characters</p>
      </div>

      <div class="form-group">
        <label for="register-confirm-password" data-i18n="register.confirm_password">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="register-confirm-password"
            name="confirm_password"
            required
            autocomplete="new-password"
          />
          <button type="button" class="toggle-password" data-target="register-confirm-password" aria-label="Toggle password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="register-submit" data-action="submit-register">
        <span data-i18n="register.submit">Create Account</span>
        <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
          <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32">
            <animate attributeName="stroke-dashoffset" values="32;0" dur="1s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </button>
    </form>

    <div class="register-footer">
      <p class="register-login-link">
        <span data-i18n="register.have_account">Already have an account?</span>
        <a href="#" data-action="go-to-login" data-i18n="register.sign_in">Sign in</a>
      </p>
    </div>
  </div>
</section>
