<section class="login-page">
  <div class="login-container">
    <div class="login-header">
      <button class="back-btn" data-action="back-to-landing" aria-label="Back to landing page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 data-i18n="login.title">Welcome to Elettra</h1>
      <p class="login-subtitle" data-i18n="login.subtitle">Electric Shift Planner</p>
    </div>
    
    <form class="login-form" data-form="login">
      <div class="form-feedback" data-role="login-feedback" role="alert" aria-live="polite" hidden></div>
      
      <div class="form-group">
        <label for="login-email" data-i18n="login.email">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input 
            type="email" 
            id="login-email" 
            name="email" 
            required 
            autocomplete="email"
            placeholder="your.email@example.com"
          />
        </div>
      </div>
      
      <div class="form-group">
        <label for="login-password" data-i18n="login.password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input 
            type="password" 
            id="login-password" 
            name="password" 
            required 
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" name="remember" />
          <span data-i18n="login.remember">Remember me</span>
        </label>
      </div>
      
      <button type="submit" class="login-submit" data-action="submit-login">
        <span data-i18n="login.submit">Sign In</span>
        <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
          <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32">
            <animate attributeName="stroke-dashoffset" values="32;0" dur="1s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </button>
    </form>
    
    <div class="login-footer">
      <p class="login-register-link">
        <span data-i18n="login.no_account">Don't have an account?</span>
        <a href="#" data-action="go-to-register" data-i18n="login.create_account">Create one</a>
      </p>
      <p class="login-help" data-i18n="login.help">Need help? Contact your administrator.</p>
    </div>
  </div>
</section>
