<section class="simulation-runs">
  <header class="page-header">
    <div class="title-container">
      <h1 data-i18n="nav.my_simulations">My simulations</h1>
    </div>
  </header>
  <p
    class="flash-message"
    data-role="flash"
    role="status"
    aria-live="polite"
    hidden
  ></p>
  <main class="simulation-runs-main">
    <div class="compare-section" data-role="compare-section">
      <h2 data-i18n="simulation.compare_title">Compare simulations</h2>
      <div class="compare-controls">
        <div class="compare-select-group">
          <label for="compare-sim-a" data-i18n="simulation.compare_simulation_a">Simulation A</label>
          <select id="compare-sim-a" data-role="compare-sim-a">
            <option value="" disabled selected data-i18n="simulation.compare_select_placeholder">Select a simulation…</option>
          </select>
        </div>
        <span class="compare-vs" data-i18n="simulation.compare_vs">vs</span>
        <div class="compare-select-group">
          <label for="compare-sim-b" data-i18n="simulation.compare_simulation_b">Simulation B</label>
          <select id="compare-sim-b" data-role="compare-sim-b">
            <option value="" disabled selected data-i18n="simulation.compare_select_placeholder">Select a simulation…</option>
          </select>
        </div>
        <button
          type="button"
          class="compare-btn"
          data-action="compare-simulations"
          data-i18n="simulation.compare_btn"
        >
          Compare
        </button>
      </div>
    </div>

    <div class="table-controls">
      <label class="sr-only" for="simulation-filter" data-i18n="simulation.filter_label">Filter simulations</label>
      <input
        id="simulation-filter"
        type="search"
        placeholder="Search simulations"
        data-i18n-placeholder="simulation.search_placeholder"
      />
      <button
        type="button"
        data-action="duplicate-simulation"
        data-i18n="simulation.duplicate"
      >
        Duplicate
      </button>
      <button
        type="button"
        data-action="delete-selected-simulations"
        data-i18n="common.delete"
      >
        Delete
      </button>
    </div>
    <div class="simulation-runs-table">
      <table>
        <caption class="sr-only" data-i18n="simulation.caption">
          Simulation runs
        </caption>
        <thead>
          <tr>
            <th class="checkbox">
              <input
                type="checkbox"
                aria-label="Select all simulation runs"
                data-i18n-aria-label="simulation.select_all"
              />
            </th>
            <th class="actions" scope="col" data-i18n="simulation.col_created">
              Created
            </th>
            <th class="day" scope="col" data-i18n="simulation.field_bus_model">
              Bus model
            </th>
            <th class="name" scope="col" data-i18n="simulation.shift_col_name">
              Shift name
            </th>
            <th class="type" scope="col" data-i18n="simulation.var_optimization_mode">
              Optimization mode
            </th>
            <th class="status" scope="col" data-i18n="simulation.col_status">
              Status
            </th>
            <th class="results" scope="col" data-i18n="simulation.col_results">
              Results
            </th>
          </tr>
        </thead>
        <tbody data-role="simulation-runs-body"></tbody>
      </table>
    </div>
  </main>
</section>
