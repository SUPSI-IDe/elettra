<section class="add-simulation form-page">
  <header class="page-header">
    <div class="header-with-close">
      <div class="title-container">
        <h1 data-i18n="simulation.make_simulation">Make a simulation</h1>
      </div>
      <button
        type="button"
        class="close-button"
        data-action="cancel"
        aria-label="Close"
        data-i18n-aria-label="common.close"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  </header>
  <main>
    <form novalidate>
      <p
        class="form-feedback"
        data-role="feedback"
        role="status"
        aria-live="polite"
        hidden
      ></p>

      <div class="form-group shift-selection">
        <label>
          <span data-i18n="simulation.field_shifts">Shift</span>
          <span class="required-mark">*</span>
        </label>
        <div class="shift-search">
          <input
            type="search"
            id="sim-shift-filter"
            placeholder="Search"
            data-i18n-placeholder="simulation.search_shifts"
          />
        </div>
        <div class="shift-table-wrapper">
          <table class="shift-table">
            <thead>
              <tr>
                <th class="checkbox">
                  
                </th>
                <th data-i18n="simulation.shift_col_name">Shift name</th>
                <th data-i18n="simulation.shift_col_bus_model">Bus model</th>
              </tr>
            </thead>
            <tbody data-role="shift-selection-body"></tbody>
          </table>
        </div>
      </div>

      <fieldset class="custom-variables-section">
        <legend data-i18n="simulation.custom_variables">Main variables</legend>

        <div class="form-group">
          <label for="var-external-temp" data-i18n="simulation.var_external_temp">
            External temperature (°C)
          </label>
          <input
            type="number"
            id="var-external-temp"
            name="external_temp_celsius"
            step="0.5"
            value="-5"
          />
        </div>

        <div class="form-group">
          <label
            for="var-occupancy"
            data-i18n="simulation.var_occupancy"
          >
            Average passenger on board (%)
          </label>
          <input
            type="number"
            id="var-occupancy"
            name="occupancy_percent"
            step="10"
            min="0"
            max="100"
            value="50"
          />
        </div>

        <div class="form-group">
          <label
            for="var-heating-type"
            data-i18n="simulation.var_heating_type"
          >
            Auxiliary heating type
          </label>
          <select id="var-heating-type" name="auxiliary_heating_type">
            <option value="hp">HP</option>
            <option value="diesel">Diesel</option>
          </select>
        </div>

      </fieldset>

      <div class="form-group">
        <label
          for="var-optimization-mode"
          data-i18n="simulation.var_optimization_mode"
        >
          Optimization mode
        </label>
        <select id="var-optimization-mode" name="optimization_mode">
          <option value="" selected disabled data-i18n="simulation.select_optimization_mode">
            Select a mode…
          </option>
          <option value="battery_only" data-i18n="simulation.mode_battery_only">Battery only</option>
          <option value="charging" data-i18n="simulation.mode_charging">Charging</option>
          <option value="joint" data-i18n="simulation.mode_joint">Joint</option>
        </select>
      </div>

      <fieldset class="charging-stations-section" data-role="charging-stations-section" hidden>
        <legend data-i18n="simulation.charging_stations">Charging stations</legend>

        <div class="form-group" data-role="battery-packs-group" hidden>
          <label for="var-num-battery-packs" data-i18n="simulation.var_num_battery_packs">
            Number of battery packs
          </label>
          <input
            type="number"
            id="var-num-battery-packs"
            name="num_battery_packs"
            min="1"
            step="1"
            value="6"
          />
        </div>

        <p class="stops-hint" data-role="stops-hint" hidden data-i18n="simulation.select_shifts_for_stops">
          Select shifts above to see available stops.
        </p>
        <div class="stops-table-wrapper" data-role="stops-table-wrapper" hidden>
          <table class="stops-table">
            <thead data-role="stops-thead"></thead>
            <tbody data-role="stops-tbody"></tbody>
          </table>
        </div>
      </fieldset>

      <p class="required-note">
        <span class="required-mark">*</span>
        <span data-i18n="simulation.required_info">Required information</span>
      </p>

      <div class="form-actions">
        <button type="button" data-action="cancel" data-i18n="common.cancel">
          Cancel
        </button>
        <button type="submit" data-i18n="simulation.run">Run simulation</button>
      </div>
    </form>
  </main>
</section>
