<section class="visualize-shift" aria-labelledby="visualize-shift-heading">
  <header class="visualize-shift__header header-with-close">
    <h1 id="visualize-shift-heading" data-i18n="shifts.visualize_title">Visualize shift</h1>
    <button
      type="button"
      data-action="close"
      class="close-button"
      aria-label="Close"
      data-i18n-aria-label="common.close"
    >
      <img src="assets/xmark.svg" alt="" aria-hidden="true" />
    </button>
  </header>
  <main>
    <div class="visualize-shift-grid">
      <section class="shift-summary" aria-labelledby="shift-summary-heading">
        <header class="shift-summary__header">
          <h2 id="shift-summary-heading" data-field="name" data-i18n="shifts.field_shift_name">Shift name</h2>
          <p class="shift-summary__bus" hidden>
            <span class="shift-summary__bus-label" data-i18n="shifts.bus_model_label">Bus model:</span>
            <span data-field="bus-name"></span>
          </p>
          <p class="shift-summary__distance">
            <span
              class="shift-summary__distance-label"
              data-i18n="shifts.daily_distance_label"
              >Daily distance:</span
            >
            <span data-field="daily-distance">—</span>
          </p>
        </header>
        <section
          class="shift-summary__block"
          aria-labelledby="shift-start-heading"
        >
          <h3 id="shift-start-heading" data-i18n="shifts.start_heading">Start</h3>
          <dl class="shift-summary__details">
            <div>
              <dt data-i18n="shifts.label_time">Time</dt>
              <dd data-field="start-time">00:00</dd>
            </div>
            <div>
              <dt data-i18n="shifts.label_depot">Depot</dt>
              <dd data-field="start-depot" data-i18n="shifts.default_depot_name">Depot name</dd>
            </div>
          </dl>
        </section>
        <div class="shift-summary__table">
          <table>
            <caption class="sr-only" data-i18n="shifts.trips_caption">
              Trips included in this shift
            </caption>
            <thead>
              <tr>
                <th scope="col" class="time" data-i18n="shifts.col_time">Time</th>
                <th scope="col" class="route" data-i18n="shifts.col_from_to">From–To</th>
              </tr>
            </thead>
            <tbody data-role="trips-body">
              <tr>
                <td colspan="3" class="empty" data-i18n="shifts.no_trips_available">No trips available.</td>
              </tr>
            </tbody>
          </table>
          <p class="shift-summary__empty" data-role="trips-empty" data-i18n="shifts.no_trips_yet" hidden>
            No trips in this shift yet.
          </p>
        </div>
        <section
          class="shift-summary__block"
          aria-labelledby="shift-end-heading"
        >
          <h3 id="shift-end-heading" data-i18n="shifts.return_heading">Return</h3>
          <dl class="shift-summary__details">
            <div>
              <dt data-i18n="shifts.label_time">Time</dt>
              <dd data-field="end-time">00:00</dd>
            </div>
            <div>
              <dt data-i18n="shifts.label_depot">Depot</dt>
              <dd data-field="end-depot" data-i18n="shifts.default_depot_name">Depot name</dd>
            </div>
          </dl>
        </section>
      </section>
      <section
        class="shift-visualization"
        aria-labelledby="shift-visualization-heading"
      >
        <header class="shift-visualization__header">
          <h2 id="shift-visualization-heading" data-i18n="shifts.timeline_heading">Timeline</h2>
        </header>
        <div
          class="timeline"
          data-role="timeline"
          role="img"
          aria-label="Shift timeline chart"
        >
          <p class="timeline__placeholder" data-i18n="shifts.timeline_render_placeholder">
            Timeline will render when data is available.
          </p>
        </div>
      </section>
    </div>
  </main>
  <script type="module">
    import {
      renderShiftVisualization,
      generateMockData,
    } from "./shift-visualization.js";

    const data = generateMockData();
    renderShiftVisualization('[data-role="timeline"]', data);

    // Handle resize
    window.addEventListener("resize", () => {
      renderShiftVisualization('[data-role="timeline"]', data);
    });
  </script>
</section>
