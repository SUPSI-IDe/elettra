<section class="form-page add-bus-model">
  <header class="page-header">
    <div class="header-with-close">
      <h1 data-i18n="buses.add_model">Add bus model</h1>
      <button
        type="button"
        data-action="close"
        class="close-button"
        aria-label="Close"
        data-i18n-aria-label="common.close"
      >
        <img src="assets/xmark.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>
  <main>
    <form data-form="add-bus-model" novalidate>
      <p
        class="form-feedback"
        data-role="feedback"
        role="status"
        aria-live="polite"
        hidden
      ></p>
      <div class="form-group">
        <label for="name" data-i18n="buses.model_name">Name <span class="required-mark" aria-hidden="true">*</span></label>
        <input type="text" id="name" name="name" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="manufacturer" data-i18n="buses.model_manufacturer">Manufacturer</label>
        <div class="manufacturer-row">
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="manufacturer"
              name="manufacturer"
              autocomplete="off"
              placeholder="Select a manufacturer…"
              data-i18n-placeholder="buses.placeholder_manufacturer"
            />
            <input type="hidden" name="manufacturer_id" id="manufacturer-id" />
            <div class="autocomplete-dropdown" data-role="manufacturer-dropdown" hidden>
              <ul class="autocomplete-list" data-role="manufacturer-list"></ul>
            </div>
          </div>
          <input
            type="text"
            id="custom_manufacturer"
            name="custom_manufacturer"
            class="custom-manufacturer"
            autocomplete="off"
            placeholder="Custom manufacturer…"
            data-i18n-placeholder="buses.placeholder_custom_manufacturer"
            aria-label="Custom manufacturer"
            data-i18n-aria-label="buses.placeholder_custom_manufacturer"
            hidden
          />
        </div>
      </div>
      <div class="form-group">
        <label for="model" class="model-label" data-i18n="buses.model_type">Model</label>
        <div class="autocomplete-wrapper">
          <input
            type="text"
            id="model"
            name="model"
            autocomplete="off"
            placeholder="Select a model…"
            data-i18n-placeholder="buses.placeholder_model"
            disabled
          />
          <input type="hidden" name="model_id" id="model-id" />
          <div class="autocomplete-dropdown" data-role="model-dropdown" hidden>
            <ul class="autocomplete-list" data-role="model-list"></ul>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label for="bus_length_m" data-i18n="buses.field_bus_length">Bus length (m) <span class="required-mark" aria-hidden="true">*</span></label>
        <select id="bus_length_m" name="bus_length_m" required>
          <option value="" disabled selected data-i18n="buses.placeholder_length">Select a length…</option>
          <option value="9">9</option>
          <option value="12">12</option>
          <option value="18">18</option>
        </select>
      </div>
      <div class="form-group">
        <label for="cost" data-i18n="buses.field_cost">Cost (CHF) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="cost"
          name="cost"
          required
          min="0"
          step="any"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="max_passengers" data-i18n="buses.field_max_passengers">Max passengers <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="max_passengers"
          name="max_passengers"
          required
          min="0"
          step="1"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="empty_weight_kg" data-i18n="buses.field_empty_weight">Empty weight (kg) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="empty_weight_kg"
          name="empty_weight_kg"
          required
          min="0"
          step="1"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="max_battery_packs" data-i18n="buses.field_max_battery_packs">Max battery packs <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="max_battery_packs"
          name="max_battery_packs"
          required
          min="1"
          step="1"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="min_battery_packs" data-i18n="buses.field_min_battery_packs">Min battery packs <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="min_battery_packs"
          name="min_battery_packs"
          required
          min="1"
          step="1"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="battery_pack_size_kwh" data-i18n="buses.field_battery_pack_size">Battery pack size (kWh) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="battery_pack_size_kwh"
          name="battery_pack_size_kwh"
          required
          min="0"
          step="any"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="max_charging_power_kw" data-i18n="buses.field_max_charging_power">Max charging power (kW) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="max_charging_power_kw"
          name="max_charging_power_kw"
          required
          min="0"
          step="any"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="battery_pack_weight_kg" data-i18n="buses.field_battery_pack_weight">Battery pack weight (kg) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="battery_pack_weight_kg"
          name="battery_pack_weight_kg"
          required
          min="0"
          step="any"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="battery_pack_lifetime" data-i18n="buses.field_battery_pack_lifetime">Battery pack lifetime (years) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="battery_pack_lifetime"
          name="battery_pack_lifetime"
          required
          min="0"
          step="1"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="bus_lifetime" data-i18n="buses.field_bus_lifetime">Bus lifetime (years) <span class="required-mark" aria-hidden="true">*</span></label>
        <input
          type="number"
          id="bus_lifetime"
          name="bus_lifetime"
          required
          min="0"
          step="1"
          autocomplete="off"
        />
      </div>
      <div class="form-group">
        <label for="description" data-i18n="buses.field_description">Description</label>
        <textarea
          id="description"
          name="description"
          rows="4"
          autocomplete="off"
        ></textarea>
      </div>
      <p class="required-note" data-i18n="common.required_info">* Required information</p>
      <div class="form-actions">
        <button type="button" data-action="cancel" data-i18n="common.cancel">Cancel</button>
        <button type="submit" data-i18n="common.save">Save</button>
      </div>
    </form>
  </main>
</section>
