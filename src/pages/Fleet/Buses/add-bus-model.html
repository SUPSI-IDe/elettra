<section class="form-page add-bus-model">
  <header class="page-header">
    <div class="header-with-close">
      <h1>Add Bus Model</h1>
      <button
        type="button"
        data-action="close"
        class="close-button"
        aria-label="Close"
      >
        <img src="assets/xmark.svg" alt="" aria-hidden="true" />
      </button>
    </div>
    <p class="intro">
      Capture the essentials so the team can reuse this model across the fleet.
    </p>
  </header>
  <main>
    <form data-form="add-bus-model" novalidate>
      <p
        class="form-feedback"
        data-role="feedback"
        role="status"
        aria-live="polite"
        hidden
      ></p>
      <div class="form-group">
        <label for="name">Model name</label>
        <input type="text" id="name" name="name" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="manufacturer">Manufacturer</label>
        <input
          type="text"
          id="manufacturer"
          name="manufacturer"
          required
          autocomplete="organization"
        />
      </div>
      <div class="form-group">
        <label for="description"
          >Description <span aria-hidden="true">(optional)</span></label
        >
        <textarea
          id="description"
          name="description"
          rows="5"
          autocomplete="off"
        ></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cost">Cost (CHF) *</label>
          <input
            type="number"
            id="cost"
            name="cost"
            min="0"
            step="0.01"
            required
          />
        </div>
        <div class="form-group">
          <label for="size">Bus Length (m) *</label>
          <input
            type="number"
            id="size"
            name="size"
            min="0"
            step="0.1"
            required
          />
        </div>
        <div class="form-group">
          <label for="passengers">Maximum number of passengers *</label>
          <input
            type="number"
            id="passengers"
            name="passengers"
            min="0"
            step="1"
            required
          />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="lifetime">Bus lifetime (years) *</label>
          <input
            type="number"
            id="lifetime"
            name="lifetime"
            min="0"
            step="1"
            required
          />
        </div>
        <div class="form-group">
          <label for="battery_cost">Single pack battery cost (CHF) *</label>
          <input
            type="number"
            id="battery_cost"
            name="battery_cost"
            min="0"
            step="0.01"
            required
          />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="battery_lifetime">Battery pack lifetime (years) *</label>
          <input
            type="number"
            id="battery_lifetime"
            name="battery_lifetime"
            min="0"
            step="1"
            required
          />
        </div>
        <div class="form-group">
          <label for="maintenance_cost">Buses Maintenance (CHF/Km) *</label>
          <input
            type="number"
            id="maintenance_cost"
            name="maintenance_cost"
            min="0"
            step="0.01"
            required
          />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="cancel" class="secondary-btn">
          Cancel
        </button>
        <button type="submit" class="primary-btn">Save</button>
      </div>
    </form>
  </main>
</section>
