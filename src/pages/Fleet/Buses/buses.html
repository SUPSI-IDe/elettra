<section class="buses">
  <header class="page-header">
    <div class="title-container">
      <h1 data-i18n="nav.buses">Bus Models</h1>
      <p>Manage your fleet's bus models. A bus is automatically created for each model.</p>
    </div>
    <button class="header-action-btn green" data-action="add-bus-model">
      Add Bus Model
    </button>
  </header>
  <p
    class="flash-message"
    data-role="flash"
    role="status"
    aria-live="polite"
    hidden
  ></p>
  <main class="buses-content">
    <section class="bus-models">
      <div class="table-controls">
        <input type="text" placeholder="Search models" />
        <div class="actions">
          <button
            type="button"
            data-action="delete-selected-models"
            data-i18n="common.delete"
          >
            Delete
          </button>
          <button
            type="button"
            data-action="edit-selected-model"
            data-i18n="common.edit"
          >
            Edit
          </button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th class="checkbox">
              <input type="checkbox" aria-label="Select all bus models" />
            </th>
            <th class="model">Model</th>
            <th class="manufacturer">Manufacturer</th>
            <th class="description">Description</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
</section>
