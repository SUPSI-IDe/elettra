<section class="buses">
  <header class="page-header">
    <div class="title-container">
      <h1 data-i18n="nav.buses">Bus Models</h1>
    </div>
    <button class="header-action-btn green" data-action="add-bus-model" data-i18n="buses.add_model">
      Add Bus Model
    </button>
  </header>
  <p
    class="flash-message"
    data-role="flash"
    role="status"
    aria-live="polite"
    hidden
  ></p>
  <main class="buses-content">
    <section class="bus-models">
      <div class="table-controls">
        <input
          type="text"
          placeholder="Search models"
          data-i18n-placeholder="buses.search_placeholder"
        />
        <div class="actions">
          <button
            type="button"
            data-action="delete-selected-models"
            data-i18n="common.delete"
          >
            Delete
          </button>
          <button
            type="button"
            data-action="edit-selected-model"
            data-i18n="common.edit"
          >
            Edit
          </button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th class="checkbox">
              <input
                type="checkbox"
                aria-label="Select all bus models"
                data-i18n-aria-label="buses.select_all_models"
              />
            </th>
            <th class="name" data-i18n="buses.model_name">Name</th>
            <th class="manufacturer" data-i18n="buses.model_manufacturer">
              Manufacturer
            </th>
            <th class="model" data-i18n="buses.model_type">Type</th>
            <th class="size" data-i18n="buses.model_size">Size [m]</th>
            <th class="cost" data-i18n="buses.model_cost">Cost [kCHF]</th>
            <th class="lifetime" data-i18n="buses.model_lifetime">
              Lifetime [y]
            </th>
            <th class="max-passengers" data-i18n="buses.model_max_passengers">
              Max passengers
            </th>
            <th
              class="battery-pack-size"
              data-i18n="buses.model_battery_pack_size"
            >
              Battery pack size [kWh]
            </th>
            <th
              class="max-charging"
              data-i18n="buses.model_max_charging"
            >
              Maximum charging [kW]
            </th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
</section>
