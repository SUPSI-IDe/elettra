<section class="buses">
  <header class="page-header">
    <div class="title-container">
      <h1 data-i18n="nav.buses">Buses</h1>
      <p>Add a bus model and then a bus</p>
    </div>
    <button class="header-action-btn green" data-action="add-bus-model">
      Add Bus Model
    </button>
  </header>
  <p
    class="flash-message"
    data-role="flash"
    role="status"
    aria-live="polite"
    hidden
  ></p>
  <main class="buses-grid">
    <section class="bus-models">
      <h2 data-i18n="buses.title">Bus Models</h2>
      <div class="table-controls">
        <input type="text" placeholder="Search models" />
        <div class="actions">
          <button
            type="button"
            data-action="delete-selected-models"
            data-i18n="common.delete"
          >
            Delete
          </button>
          <button
            type="button"
            data-action="edit-selected-model"
            data-i18n="common.edit"
          >
            Edit
          </button>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="checkbox">
                <input type="checkbox" aria-label="Select all bus models" />
              </th>
              <th class="model">Bus Model</th>
              <th class="manufacturer">Manufacturer</th>
              <th class="cost">Cost</th>
              <th class="size">Size (m)</th>
              <th class="passengers">Passengers (max)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination" data-role="pagination"></div>
    </section>
  </main>
</section>
