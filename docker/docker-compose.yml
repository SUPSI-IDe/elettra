services:
  # Development service with hot reload
  elettra-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: elettra-dev
    ports:
      - "9010:9010"
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      - VITE_API_ROOT=${VITE_API_ROOT:-}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://host.docker.internal:8002}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dev
    stdin_open: true
    tty: true

  # Local development service (host backend on this machine)
  elettra-local:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: elettra-local
    ports:
      - "9010:9010"
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      - VITE_API_ROOT=${VITE_API_ROOT:-}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://isaac-elettra.dacd.supsi.ch:8002}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - local
    stdin_open: true
    tty: true

  # Local development via VPN (backend reachable at VPN IP)
  elettra-local-vpn:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: elettra-local-vpn
    ports:
      - "9010:9010"
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      - VITE_API_ROOT=${VITE_API_ROOT:-}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://10.9.0.5:8002}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - local-vpn
    stdin_open: true
    tty: true

  # Production service with nginx
  elettra:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
      args:
        - VITE_API_ROOT=${VITE_API_ROOT:-}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: elettra
    ports:
      - "80:80"
    environment:
      - API_BACKEND_URL=${API_BACKEND_URL:-http://isaac-elettra.dacd.supsi.ch:8002}
    restart: unless-stopped
    profiles:
      - prod
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Production-style service served directly by Vite preview
  elettra-prod-vite:
    build:
      context: ..
      dockerfile: docker/Dockerfile.preview
      network: host
      args:
        - VITE_API_ROOT=${VITE_API_ROOT:-}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: elettra-prod-vite
    ports:
      - "9010:9010"
    environment:
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://isaac-elettra.dacd.supsi.ch:8002}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-bismuto.supsi.ch}
    restart: unless-stopped
    profiles:
      - prod-vite
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9010/elettra/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: elettra-network
